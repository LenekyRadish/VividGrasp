<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Watch the VividGrasp three-ball PyBullet showcase online." />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23172026'/%3E%3Cpath d='M17 18h9l6 19 6-19h9L36 46h-8L17 18z' fill='%23ffffff'/%3E%3C/svg%3E"
    />
    <title>VividGrasp PyBullet Showcase</title>
  </head>
  <body>
    <div id="app" class="page">
      <header class="topbar">
        <div class="brand">
          <p>Stanford AI4ALL Robotics</p>
          <h1>VividGrasp PyBullet Showcase</h1>
        </div>
        <button id="replayButton" type="button">Run PyBullet</button>
      </header>

      <main class="viewer">
        <figure class="render-frame">
          <img
            id="pybulletRender"
            src="/pybullet-showcase.gif"
            alt="PyBullet render of the VividGrasp arm sorting three balls into buckets"
          />
          <figcaption class="caption">
            <span>Rendered from the three-ball PyBullet bucket scene.</span>
            <span>Click Run PyBullet to replay.</span>
          </figcaption>
        </figure>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
